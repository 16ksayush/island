name: CI

# Runs the hermetic pytest suite on every push and PR to main.
# The suite mocks all Google Drive calls and injects dummy env vars
# (see tests/conftest.py), so NO real GD_API_KEY / GD_ROOT_FOLDER is
# needed here — CI stays fast and credential-free.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"   # matches render.yaml PYTHON_VERSION
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -q

      # Trigger the Render deploy ONLY after the suite passes, and ONLY on a
      # push to main (never on PRs). This is the reliable "deploy after CI
      # passes" path: GitHub Actions calls Render's Deploy Hook directly, so it
      # does not depend on Render watching GitHub checks (which is flaky and
      # was leaving commits undeployed until a manual deploy).
      #
      # Setup (one-time):
      #   1. Render dashboard -> your service -> Settings -> Deploy Hook -> copy URL.
      #   2. GitHub repo -> Settings -> Secrets and variables -> Actions ->
      #      add secret RENDER_DEPLOY_HOOK = that URL.
      #   3. Render dashboard -> Settings -> set Auto-Deploy to "Off" (so this
      #      hook is the ONLY trigger and you don't get double deploys).
      # Until the secret is set this step no-ops, so it never breaks CI.
      - name: Trigger Render deploy (main only, after tests pass)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK secret not set; skipping deploy trigger."
            exit 0
          fi
          curl -fsSL "$RENDER_DEPLOY_HOOK" > /dev/null
          echo "Render deploy triggered after green CI."
