name: CI

# Runs the hermetic pytest suite on every push and PR to main.
# The suite mocks all Google Drive calls and injects dummy env vars
# (see tests/conftest.py), so NO real GD_API_KEY / GD_ROOT_FOLDER is
# needed here — CI stays fast and credential-free.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"   # matches render.yaml PYTHON_VERSION
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -q
