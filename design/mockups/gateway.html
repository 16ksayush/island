<!DOCTYPE html>
<!--
  M16 MOCKUP — neutral chest-chooser GATEWAY (theme-agnostic, horror x fantasy mix).
  Look/feel artifact for sign-off. NO .theme-* class anywhere (D16). Three chests,
  middle largest; moon / half-sun-half-moon / sun symbols. Click or focus+Enter/Space
  any chest to play its reveal (ghost-zoom -> /map/horror, cake-zoom -> /map/sea,
  middle = random). Honors prefers-reduced-motion (skips the reveal). Static: no
  backend; the reveal navigates to the existing level-horror.html / level-sea.html
  mockups as stand-ins for the real /map/{theme} subpages.

  ART REVISION 2026-06-13 — PAINTED backdrop. The former hand-drawn SVG scene
  (dragon / torches / arched doorway / treasure hoard) is REMOVED. The gateway now
  uses a full-bleed PAINTED raster as its background (a dragon on a gold hoard in a
  torch-lit, moonlit vault). The three chests, the dragon's speech-bubble heading
  and the brand logo are the SCALING FRONT LAYER drawn on top of the painting; a
  decorative scrim keeps them legible across crops. Mockup references the image at
  the RELATIVE path ../../static/img/gateway/gateway-bg.jpg; production uses the
  absolute /static/img/gateway/gateway-bg.jpg.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>M16 mockup — choose a chest (gateway)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Neutral horror x fantasy display face, M15 Google-Fonts pattern, non-blocking. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&display=swap" />
    <link rel="stylesheet" href="m16-gateway.css" />
  </head>

  <body>
    <!-- The neutral gateway: NO theme class. Its own .gateway scoped tokens.
         BACKDROP is the PAINTED dragon-vault raster (gateway-bg.jpg), set as a
         full-bleed `cover` background on .gateway (mockup path is relative;
         production uses /static/img/gateway/gateway-bg.jpg). The hand-drawn SVG
         scene (dragon / torches / arched doorway / hoard) was REMOVED in favour
         of the painting (art revision 2026-06-13). The chests, speech bubble and
         logo are the SCALING FRONT LAYER that sits on the painting. -->
    <div class="gateway">

      <!-- z-0 decorative scrims (inert) — a soft TOP scrim keeps the speech
           bubble legible near the painted dragon's head, and a stronger BOTTOM
           scrim gives the chests a consistent dark "floor" regardless of how the
           painting crops across aspect ratios. Decorative only: aria-hidden,
           pointer-events:none, NO tabindex. Does NOT wash out the painting. -->
      <div class="gw-scrim" aria-hidden="true"></div>

      <!-- z-5 App brand mark, overlaid top-left (present on every page, incl.
           the gateway). Same shared art as the maps/level pages. On the gateway
           it links to "/" (self) — the persistent home affordance. A real link,
           NOT aria-hidden. (Mockup path is relative; production uses
           /static/img/logo/create_thumb.png.) -->
      <a href="#" class="brand-logo" aria-label="tOUR-de-Anshika — home">
        <img class="app-logo" src="../../static/img/logo/create_thumb.png"
             alt="tOUR-de-Anshika" decoding="async" />
      </a>

      <!-- z-1 content -->
      <main class="gw-stage">
        <!-- The painted dragon SPEAKS the prompt. The heading is still the page's
             real semantic <h1 class="gw-heading" id="gw-heading"> (assistive-tech
             reachable, JS/test selectors preserved) — it is just RESTYLED into a
             DARK, SMOKY, GLOWING speech balloon with glowing AMBER cursive text.
             It sits in the UPPER band, near the painted dragon's head/mouth; the
             ::before/::after pseudo-element tail aims UP toward the painted mouth.
             Wrapper carries no node — tail = pseudo-elements only. -->
        <h1 class="gw-heading" id="gw-heading" lang="en">choose a chest</h1>

        <!-- spacer pushes the chest row down onto the painted gold hoard -->
        <div class="gw-stage-fill" aria-hidden="true"></div>

        <div class="gw-chests">

          <!-- ============ CHEST 1 — MOON -> Horror ============ -->
          <button class="gw-chest gw-chest--1" type="button" data-theme="horror"
                  aria-label="Open the moon chest — enter the haunted corridor">
            <svg class="gw-chest-art" viewBox="0 0 200 170" aria-hidden="true" focusable="false">
              <!-- inner glow (revealed when lid opens) -->
              <ellipse class="gw-inner-glow" cx="100" cy="92" rx="62" ry="20" fill="#bcd0ff" opacity="0"/>
              <!-- body -->
              <rect x="26" y="86" width="148" height="70" rx="8" fill="#6b4a2b"/>
              <rect x="26" y="86" width="148" height="70" rx="8" fill="url(#wood1)" fill-opacity="0.5"/>
              <rect x="86" y="104" width="28" height="34" rx="4" fill="#d8a85a"/>
              <rect x="92" y="116" width="16" height="14" rx="3" fill="#4a3119"/>
              <!-- lid (hinges open) -->
              <g class="gw-lid">
                <path d="M26 92 V70 C26 44 56 30 100 30 C144 30 174 44 174 70 V92 Z" fill="#7a5631"/>
                <path d="M26 92 V70 C26 44 56 30 100 30 C144 30 174 44 174 70 V92 Z" fill="url(#wood1)" fill-opacity="0.5"/>
                <rect x="26" y="84" width="148" height="9" fill="#a87a33"/>
                <rect class="gw-chest-rim" x="26.5" y="60" width="147" height="32" rx="6"
                      fill="none" stroke="#d8a85a" stroke-width="1.5"/>
                <!-- MOON symbol on the lid -->
                <g class="gw-symbol">
                  <path d="M112 62 a16 16 0 1 1 -0.1 -0.2 a12 12 0 1 0 0.1 0.2 Z" fill="#dfe4ff"/>
                  <circle cx="100" cy="62" r="20" fill="#dfe4ff" opacity="0.16"/>
                </g>
              </g>
              <defs>
                <linearGradient id="wood1" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0" stop-color="#8a6238"/><stop offset="1" stop-color="#4a3119"/>
                </linearGradient>
              </defs>
            </svg>
          </button>

          <!-- ====== CHEST 2 — HALF-SUN/HALF-MOON (LARGEST) -> random ====== -->
          <button class="gw-chest gw-chest--2" type="button" data-theme="random"
                  aria-label="Open the twin chest — enter a random realm">
            <svg class="gw-chest-art" viewBox="0 0 200 170" aria-hidden="true" focusable="false">
              <ellipse class="gw-inner-glow" cx="100" cy="92" rx="66" ry="22" fill="#ffe2a8" opacity="0"/>
              <rect x="26" y="86" width="148" height="70" rx="8" fill="#6b4a2b"/>
              <rect x="26" y="86" width="148" height="70" rx="8" fill="url(#wood2)" fill-opacity="0.5"/>
              <rect x="86" y="104" width="28" height="34" rx="4" fill="#d8a85a"/>
              <rect x="92" y="116" width="16" height="14" rx="3" fill="#4a3119"/>
              <g class="gw-lid">
                <path d="M26 92 V70 C26 44 56 30 100 30 C144 30 174 44 174 70 V92 Z" fill="#7a5631"/>
                <path d="M26 92 V70 C26 44 56 30 100 30 C144 30 174 44 174 70 V92 Z" fill="url(#wood2)" fill-opacity="0.5"/>
                <rect x="26" y="84" width="148" height="9" fill="#a87a33"/>
                <rect class="gw-chest-rim" x="26.5" y="60" width="147" height="32" rx="6"
                      fill="none" stroke="#d8a85a" stroke-width="1.5"/>
                <!-- HALF-SUN / HALF-MOON symbol: left crescent (cool) | right sun (warm) -->
                <g class="gw-symbol">
                  <!-- right half: sun + rays -->
                  <g>
                    <line x1="100" y1="38" x2="100" y2="32" stroke="#ffce6b" stroke-width="2.4"/>
                    <line x1="116" y1="46" x2="121" y2="41" stroke="#ffce6b" stroke-width="2.4"/>
                    <line x1="124" y1="62" x2="131" y2="62" stroke="#ffce6b" stroke-width="2.4"/>
                    <line x1="116" y1="78" x2="121" y2="83" stroke="#ffce6b" stroke-width="2.4"/>
                  </g>
                  <!-- disc split: left cool crescent, right warm sun -->
                  <path d="M100 49 a13 13 0 0 0 0 26 Z" fill="#cdd6ff"/>
                  <path d="M100 49 a13 13 0 0 1 0 26 Z" fill="#ffce6b"/>
                  <circle cx="100" cy="62" r="13" fill="none" stroke="#fff1cf" stroke-width="1.2" opacity="0.7"/>
                </g>
              </g>
              <defs>
                <linearGradient id="wood2" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0" stop-color="#8a6238"/><stop offset="1" stop-color="#4a3119"/>
                </linearGradient>
              </defs>
            </svg>
          </button>

          <!-- ============ CHEST 3 — SUN -> Sea ============ -->
          <button class="gw-chest gw-chest--3" type="button" data-theme="sea"
                  aria-label="Open the sun chest — enter the sunlit archipelago">
            <svg class="gw-chest-art" viewBox="0 0 200 170" aria-hidden="true" focusable="false">
              <ellipse class="gw-inner-glow" cx="100" cy="92" rx="62" ry="20" fill="#ffe2a8" opacity="0"/>
              <rect x="26" y="86" width="148" height="70" rx="8" fill="#6b4a2b"/>
              <rect x="26" y="86" width="148" height="70" rx="8" fill="url(#wood3)" fill-opacity="0.5"/>
              <rect x="86" y="104" width="28" height="34" rx="4" fill="#d8a85a"/>
              <rect x="92" y="116" width="16" height="14" rx="3" fill="#4a3119"/>
              <g class="gw-lid">
                <path d="M26 92 V70 C26 44 56 30 100 30 C144 30 174 44 174 70 V92 Z" fill="#7a5631"/>
                <path d="M26 92 V70 C26 44 56 30 100 30 C144 30 174 44 174 70 V92 Z" fill="url(#wood3)" fill-opacity="0.5"/>
                <rect x="26" y="84" width="148" height="9" fill="#a87a33"/>
                <rect class="gw-chest-rim" x="26.5" y="60" width="147" height="32" rx="6"
                      fill="none" stroke="#d8a85a" stroke-width="1.5"/>
                <!-- SUN symbol on the lid -->
                <g class="gw-symbol">
                  <g stroke="#ffce6b" stroke-width="2.4" stroke-linecap="round">
                    <line x1="100" y1="40" x2="100" y2="33"/>
                    <line x1="100" y1="84" x2="100" y2="91"/>
                    <line x1="78"  y1="62" x2="71"  y2="62"/>
                    <line x1="122" y1="62" x2="129" y2="62"/>
                    <line x1="84"  y1="46" x2="79"  y2="41"/>
                    <line x1="116" y1="46" x2="121" y2="41"/>
                    <line x1="84"  y1="78" x2="79"  y2="83"/>
                    <line x1="116" y1="78" x2="121" y2="83"/>
                  </g>
                  <circle cx="100" cy="62" r="13" fill="#ffce6b"/>
                  <circle cx="100" cy="62" r="20" fill="#ffce6b" opacity="0.16"/>
                </g>
              </g>
              <defs>
                <linearGradient id="wood3" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0" stop-color="#8a6238"/><stop offset="1" stop-color="#4a3119"/>
                </linearGradient>
              </defs>
            </svg>
          </button>

        </div>
      </main>

      <!-- z-90 reveal overlay — covers the real viewport (fixed inset:0). Inert. -->
      <div class="gw-reveal" id="gw-reveal" aria-hidden="true">
        <div class="gw-reveal-veil"></div>

        <!-- GHOST (horror picks) -->
        <svg class="gw-reveal-obj gw-reveal-ghost" id="gw-reveal-ghost"
             viewBox="0 0 100 128" aria-hidden="true" focusable="false">
          <defs>
            <radialGradient id="ghostGlow" cx="50%" cy="40%" r="60%">
              <stop offset="0%" stop-color="#eaf0ff" stop-opacity="0.95"/>
              <stop offset="100%" stop-color="#9fb6e0" stop-opacity="0"/>
            </radialGradient>
          </defs>
          <ellipse cx="50" cy="50" rx="48" ry="56" fill="url(#ghostGlow)"/>
          <path fill="#f3f6ff"
                d="M50 6C28 6 16 22 16 48v68l9-9 9 9 8-9 8 9 9-9 8 9 9-9V48C84 22 72 6 50 6z"/>
          <circle cx="38" cy="50" r="5" fill="#1a2238"/>
          <circle cx="62" cy="50" r="5" fill="#1a2238"/>
          <ellipse cx="50" cy="70" rx="6" ry="9" fill="#1a2238" opacity="0.85"/>
        </svg>

        <!-- CAKE (sea picks) -->
        <svg class="gw-reveal-obj gw-reveal-cake" id="gw-reveal-cake"
             viewBox="0 0 120 120" aria-hidden="true" focusable="false">
          <!-- candle flames -->
          <g class="gw-flame">
            <ellipse cx="40" cy="22" rx="4" ry="8" fill="#ffd36b"/>
            <ellipse cx="60" cy="18" rx="4" ry="8" fill="#ffd36b"/>
            <ellipse cx="80" cy="22" rx="4" ry="8" fill="#ffd36b"/>
          </g>
          <!-- candles -->
          <rect x="38" y="30" width="4" height="20" fill="#ef6f6f"/>
          <rect x="58" y="26" width="4" height="24" fill="#6fb1ef"/>
          <rect x="78" y="30" width="4" height="20" fill="#8fd49a"/>
          <!-- top tier -->
          <rect x="28" y="50" width="64" height="22" rx="5" fill="#ffe0ec"/>
          <path d="M28 56 q8 8 16 0 q8 8 16 0 q8 8 16 0 q8 8 16 0 V72 H28 Z" fill="#fff6fb"/>
          <!-- base tier -->
          <rect x="18" y="72" width="84" height="34" rx="6" fill="#f7c9da"/>
          <path d="M18 78 q10 9 21 0 q10 9 21 0 q10 9 21 0 q10 9 21 0 V106 H18 Z" fill="#fff6fb"/>
          <!-- sprinkles -->
          <circle cx="40" cy="86" r="2" fill="#ef6f6f"/>
          <circle cx="58" cy="92" r="2" fill="#6fb1ef"/>
          <circle cx="74" cy="86" r="2" fill="#8fd49a"/>
        </svg>
      </div>

    </div>

    <!-- Hint banner (mockup only; not part of the real gateway) -->
    <div style="position:fixed;left:50%;bottom:10px;transform:translateX(-50%);
                font-family:system-ui,sans-serif;font-size:12px;color:#fdf3df;
                background:rgba(10,8,20,0.55);padding:6px 12px;border-radius:999px;
                z-index:50;pointer-events:none;">
      mockup · click or Tab+Enter a chest · moon→Horror, sun→Sea, middle→random
    </div>

    <script src="m16-gateway.js"></script>
  </body>
</html>
