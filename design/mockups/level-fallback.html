<!DOCTYPE html>
<!--
  M14 MOCKUP — sealed / missing ("Chudail-not-found") fallback state, BOTH themes.
  The toggle swaps the whole scene (Horror room <-> Sea shore) AND the diegetic
  note (brass plaque <-> driftwood signpost). The fallback gets the SAME full
  environment + frame + decor — it just swaps the photo source to the single
  random fallback image, so a sealed level reads as a deliberate forlorn portrait,
  not a void. The note RETAINS the literal substring "salvaged fallback content"
  (HARD GATE — NF-M14-7). Starts in Horror; toggle to feel the Sea equivalent.
-->
<html lang="en" class="theme-horror">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>M14 mockup — sealed level (fallback)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="m14-scene.css" />
  </head>
  <body>
    <div class="atmosphere" aria-hidden="true">
      <!-- HORROR scene (shown when .theme-horror) -->
      <div class="scene-horror-only">
        <div class="level-env-wall"></div>
        <div class="level-env-floor"></div>
        <div class="horror-scene" aria-hidden="true">
          <svg class="horror-silhouette horror-silhouette--doorway" viewBox="0 0 100 160" preserveAspectRatio="xMidYMin meet" focusable="false">
            <defs><radialGradient id="hr-moon" cx="50%" cy="42%" r="60%">
              <stop offset="0%" stop-color="#cfe0ff" stop-opacity="0.9" />
              <stop offset="55%" stop-color="#9fb6e0" stop-opacity="0.35" />
              <stop offset="100%" stop-color="#9fb6e0" stop-opacity="0" />
            </radialGradient></defs>
            <rect x="30" y="6" width="40" height="148" rx="20" fill="url(#hr-moon)" />
          </svg>
          <svg class="horror-silhouette horror-silhouette--figure" viewBox="0 0 120 180" preserveAspectRatio="xMidYMax meet" focusable="false">
            <path fill="#02040a" d="M60 8c-16 0-27 12-27 30 0 9 3 16 8 21-8 6-14 17-17 33-4 22-6 41-6 58h84c0-17-2-36-6-58-3-16-9-27-17-33 5-5 8-12 8-21 0-18-11-30-27-30z" />
          </svg>
          <svg class="horror-silhouette horror-silhouette--claw-left" viewBox="0 0 80 120" preserveAspectRatio="xMinYMax meet" focusable="false">
            <path fill="#02040a" d="M0 60c10-2 18-6 26-12 3 14 4 27 3 40-1-9-3-17-7-24 6 10 9 21 9 33-3-10-7-19-13-26 4 11 6 22 5 33-4-12-9-22-16-31 1 12 1 23-1 34C-2 110-2 84 0 60z" />
          </svg>
          <svg class="horror-silhouette horror-silhouette--claw-right" viewBox="0 0 80 120" preserveAspectRatio="xMinYMax meet" focusable="false">
            <path fill="#02040a" d="M0 60c10-2 18-6 26-12 3 14 4 27 3 40-1-9-3-17-7-24 6 10 9 21 9 33-3-10-7-19-13-26 4 11 6 22 5 33-4-12-9-22-16-31 1 12 1 23-1 34C-2 110-2 84 0 60z" />
          </svg>
        </div>
        <div class="level-ambient" aria-hidden="true">
          <svg class="horror-ghost horror-ghost--0" viewBox="0 0 50 64" focusable="false">
            <path d="M25 2C13 2 6 11 6 24v34l5-5 5 5 4-5 5 5 5-5 4 5 5-5V24C44 11 37 2 25 2z" />
            <circle cx="19" cy="25" r="2.6" fill="#0a0e1a" /><circle cx="31" cy="25" r="2.6" fill="#0a0e1a" />
          </svg>
          <span class="horror-twinkle horror-twinkle--0"></span>
          <span class="horror-twinkle horror-twinkle--1"></span>
        </div>
      </div>

      <!-- SEA scene (shown when .theme-sea) -->
      <div class="scene-sea-only" hidden>
        <div class="level-env-sky"></div>
        <div class="level-env-sea"></div>
        <div class="level-env-sand"></div>
        <div class="sea-scene" aria-hidden="true">
          <svg class="sea-silhouette sea-silhouette--sun" viewBox="0 0 100 100" focusable="false">
            <defs><radialGradient id="sea-sun" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#fff7dc" stop-opacity="0.95" />
              <stop offset="55%" stop-color="#ffe08a" stop-opacity="0.45" />
              <stop offset="100%" stop-color="#ffe08a" stop-opacity="0" />
            </radialGradient></defs>
            <circle cx="50" cy="50" r="46" fill="url(#sea-sun)" />
          </svg>
          <svg class="sea-silhouette sea-silhouette--palm" viewBox="0 0 120 160" preserveAspectRatio="xMidYMax meet" focusable="false">
            <path d="M58 160c-2-36 0-70 4-96l8 1c-3 26-5 60-4 95z" fill="#5b3a1e" />
            <path d="M62 64C44 50 24 50 8 60c18-2 34 4 50 16-18-22-2-44 22-52-18 4-30 18-18 40 6-26 30-36 56-32-24-2-42 14-52 36 14-20 40-24 64-12-22-12-46-6-68 8z" fill="#1f7a3d" />
          </svg>
          <svg class="sea-silhouette sea-silhouette--wave-left" viewBox="0 0 100 40" focusable="false">
            <path d="M0 30c12-10 22-10 34 0s22 10 34 0 22-10 32 0v10H0z" fill="#bfe9ff" opacity="0.8" />
          </svg>
          <svg class="sea-silhouette sea-silhouette--wave-right" viewBox="0 0 100 40" focusable="false">
            <path d="M0 30c12-10 22-10 34 0s22 10 34 0 22-10 32 0v10H0z" fill="#bfe9ff" opacity="0.8" />
          </svg>
        </div>
        <div class="level-ambient" aria-hidden="true">
          <svg class="sea-balloon sea-balloon--0" viewBox="0 0 60 90" focusable="false">
            <path d="M30 2C16 2 6 13 6 28c0 12 8 21 16 27h16c8-6 16-15 16-27C54 13 44 2 30 2z" fill="var(--bln-a)" />
            <path d="M22 4c-7 4-12 13-12 24 0 11 5 21 12 27V4z" fill="var(--bln-b)" opacity="0.9" />
            <path d="M38 4c7 4 12 13 12 24 0 11-5 21-12 27V4z" fill="var(--bln-c)" opacity="0.9" />
            <rect x="25" y="56" width="10" height="3" rx="1" fill="#7a4a1f" />
          </svg>
          <svg class="sea-bird sea-bird--0" viewBox="0 0 40 16" focusable="false">
            <path d="M2 12C8 4 14 4 20 9c6-5 12-5 18 3-6-3-11-2-18 3-7-5-12-6-18-3z" fill="#3a5a72" />
          </svg>
          <svg class="sea-cloud sea-cloud--0" viewBox="0 0 100 44" focusable="false">
            <path d="M20 38c-9 0-16-6-16-14 0-7 6-13 14-13 2-7 9-11 16-11 9 0 16 6 18 14 7 0 13 5 13 12 0 7-6 12-14 12z" fill="#ffffff" />
          </svg>
        </div>
      </div>
    </div>

    <div class="layer scene-shell">
      <header class="scene-header">
        <div class="left">
          <a href="#" class="app-logo" aria-label="Back home">tA</a>
          <h1 class="page-title" data-horror="Room 3" data-sea="Island 3">Room 3</h1>
        </div>
        <button id="theme-toggle" type="button" class="theme-toggle"
                aria-label="Toggle between Horror and Sea themes">
          <span class="toggle-icon" aria-hidden="true">🌊</span>
          <span class="toggle-label">Sail to the Sea</span>
        </button>
      </header>

      <!-- Diegetic fallback note — plaque (Horror) / signpost (Sea). The literal
           substring "salvaged fallback content" is RETAINED verbatim. -->
      <p class="level-note" role="note"
         data-horror="This door is sealed — showing salvaged fallback content."
         data-sea="This island has slipped beneath the waves — showing salvaged fallback content.">
        This door is sealed — showing salvaged fallback content.
      </p>

      <main class="level-stage">
        <svg class="frame-corner frame-corner--tl" viewBox="0 0 56 56" aria-hidden="true" focusable="false">
          <path d="M4 52V18C4 10 10 4 18 4h34" fill="none" stroke="currentColor" stroke-width="2.5" opacity="0.7"/>
        </svg>
        <svg class="frame-corner frame-corner--tr" viewBox="0 0 56 56" aria-hidden="true" focusable="false">
          <path d="M4 52V18C4 10 10 4 18 4h34" fill="none" stroke="currentColor" stroke-width="2.5" opacity="0.7"/>
        </svg>
        <svg class="frame-corner frame-corner--bl" viewBox="0 0 56 56" aria-hidden="true" focusable="false">
          <path d="M4 52V18C4 10 10 4 18 4h34" fill="none" stroke="currentColor" stroke-width="2.5" opacity="0.7"/>
        </svg>
        <svg class="frame-corner frame-corner--br" viewBox="0 0 56 56" aria-hidden="true" focusable="false">
          <path d="M4 52V18C4 10 10 4 18 4h34" fill="none" stroke="currentColor" stroke-width="2.5" opacity="0.7"/>
        </svg>

        <div class="slideshow" aria-roledescription="carousel" aria-label="Level 3 fallback image">
          <figure class="slide">
            <!-- The single random "Chudail-not-found" fallback image, framed like a portrait. -->
            <img class="slide-img" src="https://picsum.photos/seed/chudail/800/560" alt="Salvaged fallback image" />
            <figcaption class="slide-caption"
              data-horror="Nothing answers behind this door — only what was left behind."
              data-sea="Only driftwood marks where this island once stood.">
              Nothing answers behind this door — only what was left behind.
            </figcaption>
          </figure>
        </div>
      </main>

      <footer class="scene-footer">Tour-de-Anshika · Level 3</footer>
    </div>

    <script src="m14-toggle.js"></script>
  </body>
</html>
